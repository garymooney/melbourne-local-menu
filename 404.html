<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading · Melbourne Local Menu</title>
<meta property="og:title" content="Event no longer in menu">
<meta property="og:description" content="This event has rolled off Melbourne Local Menu. Browse what is on now.">
<meta property="og:url" content="https://garymooney.github.io/melbourne-local-menu/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Melbourne Local Menu">
<meta http-equiv="refresh" content="2; url=/melbourne-local-menu/">
<style>:root { color-scheme: light dark; --bg:#fafaf7; --text:#1a1a1a; --muted:#555; --accent:#c4452b; }
@media (prefers-color-scheme: dark) { :root { --bg:#15110d; --text:#f0f0f0; --muted:#bbb; --accent:#ff6b4a; } }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 3em 1em; line-height: 1.5; text-align: center; }
.wrap { max-width: 460px; margin: 0 auto; }
.brand { font-size: 0.78em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin: 0 0 2em; }
.brand a { color: inherit; text-decoration: none; }
h1 { font-size: 1.4em; margin: 0 0 0.4em; }
p { color: var(--muted); margin: 0 0 1.6em; }
.cta { display: inline-block; padding: 12px 22px; border-radius: 8px; text-align: center; font-weight: 600; text-decoration: none; font-size: 0.96em; background: var(--accent); color: var(--bg); }
.cta:hover { opacity: 0.9; }</style>
</head>
<body>
<div class="wrap">
  <p class="brand"><a href="/melbourne-local-menu/">Melbourne Local Menu</a></p>
  <p>Loading menu…</p>
</div>
<script>
  var SITE_PATH = '/melbourne-local-menu/';
  (function () {
    var m = location.pathname.match(/\/(?:e\/)?([^\/]+)\.html$/);
    var id = m ? m[1] : 'unavailable';
    window.location.replace(SITE_PATH + '#event-' + id);
  })();
</script>
</body>
</html>
