<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Melbourne menu — week of 2026-04-24</title>
<style>

:root {
  --accent-warm: #c4452b;
  --accent-cool: #3a86ff;
  --dark: #1a1a1a;
  --muted: #555;
  --faint: #888;
  --rule: #e5e5e5;
  --card-bg: #fafafa;
  --bg: #ffffff;
  --free-green: #3a9d3a;
  --body-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono-font: 'SF Mono', Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --dark: #f0f0f0;
    --muted: #bbb;
    --faint: #999;
    --rule: #333;
    --card-bg: #1e1e1e;
    --bg: #121212;
    --accent-warm: #ff6b4a;
    --accent-cool: #5a9dff;
    --free-green: #5fbe5f;
  }
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--body-font);
  color: var(--dark);
  background: var(--bg);
  margin: 0;
  padding: 0;
  line-height: 1.45;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1em 3em;
}
.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  padding-top: 1em;
}
.site-title {
  font-size: 1.5em;
  font-weight: 800;
  margin: 0 0 0.6em 0;
  padding: 12px 16px;
  color: #fff;
  background: linear-gradient(90deg, var(--accent-warm), var(--accent-cool));
  border-radius: 8px;
  line-height: 1.2;
}
.day-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: thin;
  padding: 4px 0 8px;
  margin: 0 -1em;
  padding-left: 1em;
  padding-right: 1em;
  -webkit-overflow-scrolling: touch;
}
.day-tab {
  flex: 0 0 auto;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--muted);
  padding: 8px 14px;
  border-radius: 8px;
  font-family: var(--body-font);
  font-size: 0.88em;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  line-height: 1.15;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.day-tab:hover { border-color: var(--accent-warm); color: var(--dark); }
.day-tab[aria-selected="true"] {
  background: var(--accent-warm);
  border-color: var(--accent-warm);
  color: #fff;
}
.tab-weekday { font-weight: 700; letter-spacing: 0.3px; }
.tab-date { font-size: 0.78em; opacity: 0.85; margin-top: 1px; }
.day {
  padding-top: 0.6em;
}
.day[hidden] { display: none; }
.day-heading {
  font-size: 1.25em;
  font-weight: 700;
  background: linear-gradient(
    90deg,
    color-mix(in srgb, var(--accent-warm) 13%, transparent),
    color-mix(in srgb, var(--accent-cool) 13%, transparent)
  );
  padding: 10px 14px;
  border-radius: 6px;
  margin: 1em 0 0.6em;
}
.category {
  margin-bottom: 1em;
}
.category-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 0.92em;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: #fff;
  background: var(--accent-warm);
  padding: 8px 14px;
  border-radius: 4px;
  border-left: 6px solid var(--dark);
  margin: 1.2em 0 0.6em;
  position: sticky;
  top: var(--header-offset, 120px);
  z-index: 5;
}
.category-header .count {
  font-weight: 500;
  font-size: 0.85em;
  letter-spacing: 1.5px;
  opacity: 0.85;
}
.events {
  display: grid;
  gap: 8px;
}
.events[hidden] { display: none; }
@media (min-width: 640px) {
  .events { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 1024px) {
  .events { grid-template-columns: repeat(3, 1fr); }
}
.event {
  border-left: 3px solid var(--accent-warm);
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: 0 6px 6px 0;
  display: flex;
  flex-direction: column;
}
.event.extra {
  border-left-color: var(--rule);
  border-left-style: dashed;
  background: transparent;
  opacity: 0.78;
}
.event.extra .venue,
.event.extra .title {
  font-weight: 500;
}
.event.extra .title {
  color: var(--muted);
}
.venue {
  font-size: 1.05em;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.25;
}
.suburb {
  font-size: 0.75em;
  color: var(--faint);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-top: 2px;
}
.title {
  color: var(--accent-warm);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.98em;
  margin-top: 5px;
  line-height: 1.3;
}
.title:hover { text-decoration: underline; }
.time {
  font-size: 0.88em;
  color: var(--muted);
  margin-top: 3px;
}
.description {
  font-size: 0.87em;
  color: var(--muted);
  margin-top: 5px;
  line-height: 1.4;
}
.price {
  font-size: 0.82em;
  color: var(--faint);
  font-family: var(--mono-font);
  font-weight: 500;
  margin-top: 5px;
}
.price.free {
  color: var(--free-green);
  font-weight: 700;
}
.badges { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.72em;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1.35;
}
.pill.subcategory {
  color: var(--accent-cool);
  background: color-mix(in srgb, var(--accent-cool) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent-cool) 22%, transparent);
  font-weight: 600;
}
.score-debug {
  font-size: 0.7em;
  color: var(--faint);
  font-family: var(--mono-font);
  margin-top: 4px;
  opacity: 0.7;
}
.show-more {
  display: block;
  margin: 10px 0 6px;
  padding: 6px 14px;
  font: inherit;
  font-size: 0.82em;
  font-weight: 600;
  color: var(--accent-cool);
  background: color-mix(in srgb, var(--accent-cool) 6%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent-cool) 28%, transparent);
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.show-more:hover {
  background: color-mix(in srgb, var(--accent-cool) 12%, transparent);
}
.events-expanded {
  margin-top: 4px;
  margin-left: 20px;
}
.pill.date-idea {
  color: #fff;
  background: linear-gradient(90deg, #ff006e, #fb5607, #ffbe0b, #3a9d3a);
}

/* --- Event count badge on each day tab; live-updated from the ranking. */
.tab-count {
  display: inline-block;
  margin-left: 6px;
  padding: 0 5px;
  min-width: 1.4em;
  font-size: 0.78em;
  font-weight: 700;
  text-align: center;
  border-radius: 8px;
  background: color-mix(in srgb, currentColor 18%, transparent);
  opacity: 0.85;
  line-height: 1.4;
}

/* --- Settings tab sits at the end of day-tabs, separated by a divider. */
.tab-divider {
  flex: 0 0 auto;
  width: 1px;
  align-self: stretch;
  background: var(--rule);
  margin: 0 6px;
}
.day-tab.settings-tab {
  flex-direction: row;
  align-items: center;
  gap: 6px;
  color: var(--muted);
}
.day-tab.settings-tab[aria-selected="true"] {
  background: var(--accent-cool);
  border-color: var(--accent-cool);
  color: #fff;
}
.settings-gear { font-size: 1.05em; line-height: 1; }
.settings-badge {
  display: inline-block;
  min-width: 1.4em;
  padding: 0 5px;
  font-size: 0.72em;
  font-weight: 700;
  text-align: center;
  border-radius: 8px;
  background: var(--accent-warm);
  color: #fff;
  line-height: 1.4;
}
.settings-badge[hidden] { display: none; }

/* --- Settings view (shown in place of a .day when settings tab is active). */
#settings-view { padding-top: 0.8em; }
#settings-view[hidden] { display: none; }

.settings-subtabs {
  display: flex;
  gap: 4px;
  margin: 0.4em 0 1em;
  border-bottom: 2px solid var(--rule);
  overflow-x: auto;
  scrollbar-width: thin;
}
.settings-subtab {
  flex: 0 0 auto;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--muted);
  padding: 8px 14px;
  font-family: var(--body-font);
  font-size: 0.88em;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.settings-subtab:hover { color: var(--dark); }
.settings-subtab[aria-selected="true"] {
  color: var(--accent-cool);
  border-bottom-color: var(--accent-cool);
}

.settings-panel[hidden] { display: none; }

.settings-preview-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1em;
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: 6px;
  border-left: 3px solid var(--accent-cool);
}
.settings-preview-row .settings-hint {
  font-size: 0.88em;
  color: var(--muted);
  line-height: 1.4;
}
.settings-preview-btn {
  flex: 0 0 auto;
  background: var(--accent-cool);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  font: inherit;
  font-weight: 600;
  font-size: 0.88em;
  cursor: pointer;
}
.settings-preview-btn:hover { filter: brightness(1.08); }

.subcat-group { margin-bottom: 1.4em; }
.subcat-group-heading {
  font-size: 0.78em;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin: 0 0 0.6em;
}
.subcat-row {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 6px 2px;
  border-bottom: 1px solid var(--rule);
}
.subcat-row:last-child { border-bottom: none; }
.subcat-name {
  font-size: 0.95em;
  font-weight: 600;
  color: var(--dark);
  font-family: var(--mono-font);
}
.tri-state {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: 6px;
  overflow: hidden;
}
.tri {
  background: transparent;
  border: none;
  padding: 6px 10px;
  font: inherit;
  font-size: 0.78em;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.3px;
  border-right: 1px solid var(--rule);
  transition: background 0.12s, color 0.12s;
}
.tri:last-child { border-right: none; }
.tri:hover { background: color-mix(in srgb, currentColor 8%, transparent); }
.tri[aria-pressed="true"][data-value="love"]  { background: #3a9d3a; color: #fff; }
.tri[aria-pressed="true"][data-value="like"]  { background: #a1cf5f; color: #fff; }
.tri[aria-pressed="true"][data-value="neutral"] { background: var(--muted); color: #fff; }
.tri[aria-pressed="true"][data-value="avoid"] { background: #c4452b; color: #fff; }

.settings-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 1em;
  padding-top: 1em;
  border-top: 1px solid var(--rule);
}
.settings-action {
  background: transparent;
  border: 1px solid var(--rule);
  padding: 8px 14px;
  border-radius: 6px;
  font: inherit;
  font-size: 0.85em;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
}
.settings-action:hover {
  border-color: var(--accent-cool);
  color: var(--accent-cool);
}

.settings-placeholder {
  padding: 2em 1em;
  text-align: center;
  color: var(--muted);
  font-size: 0.95em;
  line-height: 1.5;
  background: var(--card-bg);
  border-radius: 8px;
  border: 1px dashed var(--rule);
}

/* Facets sub-tab rows — each facet gets a name + one-line blurb next
 * to a 4-tier picker. Same .tri-state control as subcategory rows. */
.facet-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 2px;
  border-bottom: 1px solid var(--rule);
}
.facet-row:last-child { border-bottom: none; }
.facet-label { display: flex; flex-direction: column; min-width: 0; }
.facet-name {
  font-size: 0.95em;
  font-weight: 600;
  color: var(--dark);
}
.facet-blurb {
  font-size: 0.82em;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.35;
}
.facet-intro {
  font-size: 0.85em;
  color: var(--muted);
  line-height: 1.5;
  margin: 0 0 1em;
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: 6px;
  border-left: 3px solid var(--accent-cool);
}

/* Rules + Shape sub-tabs share a row layout: label block on the left,
 * a control on the right. The rule-toggle is a simple on/off button;
 * the shape-input is a range slider + value display. */
.rule-row, .shape-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 2px;
  border-bottom: 1px solid var(--rule);
}
.rule-row:last-child, .shape-row:last-child { border-bottom: none; }
.rule-row > .rule-text, .shape-row > .shape-text { min-width: 0; }
.rule-name, .shape-name {
  font-size: 0.95em;
  font-weight: 600;
  color: var(--dark);
  display: block;
}
.rule-hint, .shape-hint {
  display: block;
  font-size: 0.82em;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.35;
}
.rule-weight {
  display: inline-block;
  font-family: var(--mono-font);
  font-size: 0.78em;
  color: var(--faint);
  margin-left: 6px;
}
.rule-toggle {
  flex: 0 0 auto;
  background: transparent;
  border: 1px solid var(--rule);
  padding: 6px 14px;
  border-radius: 6px;
  font: inherit;
  font-size: 0.82em;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  min-width: 4.5em;
}
.rule-toggle[aria-pressed="true"] {
  background: #3a9d3a;
  border-color: #3a9d3a;
  color: #fff;
}
.rule-toggle[aria-pressed="false"] {
  background: transparent;
  color: var(--faint);
  border-style: dashed;
}

/* Tri-state Pin/On/Off for pin-capable rules. Reuses .tri chips from
 * the subcategory/facet rows, with distinct pressed colours for the
 * three pin-rule values. */
.tri[aria-pressed="true"][data-value="pin"] { background: var(--accent-warm); color: #fff; }
.tri[aria-pressed="true"][data-value="on"]  { background: #3a9d3a; color: #fff; }
.tri[aria-pressed="true"][data-value="off"] { background: var(--muted); color: #fff; }

.shape-input {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 220px;
}
.shape-input input[type="range"] {
  flex: 1;
  min-width: 140px;
  accent-color: var(--accent-cool);
}
.shape-value {
  font-family: var(--mono-font);
  font-size: 0.88em;
  color: var(--dark);
  min-width: 3.2em;
  text-align: right;
}

</style>
</head>

<div class="container">
<header class="site-header">
<h1 class="site-title">Melbourne menu — week of 2026-04-24</h1>
<nav class="day-tabs" role="tablist" aria-label="Days"></nav>
</header>
<main id="main">
<section id="settings-view" role="tabpanel" aria-labelledby="tab-settings" hidden></section>
</main>

    merged.rule_weights = {};
    for (var r in defaults.rule_weights) {
      merged.rule_weights[r] = defaults.rule_weights[r];
    }
    for (var rn in merged.rule_states) {
      if (merged.rule_states[rn] === 'off' && rn in merged.rule_weights) {
        merged.rule_weights[rn] = 0;
      }
    }

    // Effective pinning_rules derived from rule_states. Starts from the
    // default pinning list, then promotes/demotes based on state: a
    // pin-capable rule whose state is 'pin' is included; 'on'/'off' are
    // excluded.
    var capable = defaults.pin_capable_rules || ['priority_venue'];
    var baseline = new Set(defaults.pinning_rules || []);
    merged.pinning_rules = [];
    for (var ci = 0; ci < capable.length; ci++) {
      var cr = capable[ci];
      var cstate = merged.rule_states[cr] || (baseline.has(cr) ? 'pin' : 'on');
      if (cstate === 'pin') merged.pinning_rules.push(cr);
    }
    merged.pin_capable_rules = capable.slice();

    // Shape (score floor, diversity penalties, tier bonuses) — per-field
    // override. Stored `shape` only carries fields the user has touched.
    var shape = stored.shape || {};
    merged.score_floor = shape.score_floor != null ? shape.score_floor : defaults.score_floor;
    merged.diversity_category = shape.diversity_category != null
      ? shape.diversity_category : defaults.diversity_category;
    merged.diversity_subcategory = shape.diversity_subcategory != null
      ? shape.diversity_subcategory : defaults.diversity_subcategory;
    merged.tier_bonuses = {};
    for (var tb in defaults.tier_bonuses) {
      merged.tier_bonuses[tb] = defaults.tier_bonuses[tb];
    }
    if (shape.love_bonus  != null) merged.tier_bonuses.love  = shape.love_bonus;
    if (shape.like_bonus  != null) merged.tier_bonuses.like  = shape.like_bonus;
    if (shape.avoid_bonus != null) merged.tier_bonuses.avoid = shape.avoid_bonus;
    return merged;
  }

  function saveProfile() {
    try {
      // Persist a minimal set: the user's full tier maps, the list of
      // disabled rules, and the specific shape fields they've touched.
      // Keeps the stored blob small and forward-compatible.
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        subcategory_tiers: profile.subcategory_tiers || {},
        facet_tiers: profile.facet_tiers || {},
        rule_states: profile.rule_states || {},
        shape: {
          score_floor: profile.score_floor,
          diversity_category: profile.diversity_category,
          diversity_subcategory: profile.diversity_subcategory,
          love_bonus:  (profile.tier_bonuses || {}).love,
          like_bonus:  (profile.tier_bonuses || {}).like,
          avoid_bonus: (profile.tier_bonuses || {}).avoid,
        },
      }));
    } catch (_) {}
  }

  var profile = mergeProfile(defaultProfile, loadStoredProfile());

  var CATEGORY_ORDER = defaultProfile.category_order || [
    'live_music', 'watch', 'hands_on', 'movement', 'go_somewhere', 'other',
  ];
  var CATEGORY_DISPLAY = defaultProfile.category_display || {};

  var activeTab = null;    // slug of the currently-shown panel, or 'settings'
  var lastDayTab = null;   // last non-settings tab; for "Back to last day"
  try {
    lastDayTab = sessionStorage.getItem(SESSION_LAST_DAY) || null;
  } catch (_) {}

  // ============================================================
  //  Utilities
  // ============================================================
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function slugify(s) {
    return String(s).toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '') || 'day';
  }

  var WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August',
                'September','October','November','December'];

  function formatDayHeading(isoDate) {
    // '2026-04-24' -> 'Thursday 24 April' (Melbourne-local date;
    // using T12:00:00 avoids the UTC-boundary-rollover edge case).
    var d = new Date(isoDate + 'T12:00:00');
    return WEEKDAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
  }

  function dayShort(heading) {
    var i = heading.indexOf(' ');
    return i < 0 ? heading : heading.substring(0, i);
  }

  // ============================================================
  //  Scoring — JS port of recommend._score_event
  // ============================================================
  function scoreEvent(event, profile) {
    var score = 0.0;
    var facetGlobal = profile.facet_global || 0;

    // Unified facets. Each facet's effective weight comes from its
    // current tier via facet_tier_weights (love=+0.18, like=+0.10,
    // neutral=0, avoid=-0.10). Asymmetric clamp: positive weight rewards
    // matches only, negative weight punishes matches only, neutral
    // ignored. Mirror of recommend._score_event.
    var facets = event.facet_cosines || {};
    var fTiers = profile.facet_tiers || {};
    var fTierW = profile.facet_tier_weights || {};
    for (var fname in facets) {
      var tier = fTiers[fname] || 'neutral';
      var fw = fTierW[tier];
      if (fw == null || fw === 0) continue;
      var fc = facetGlobal * fw * facets[fname];
      if (fw > 0 && fc > 0) score += fc;
      else if (fw < 0 && fc < 0) score += fc;
    }
    // Rule bonuses: sum weight for each rule that fired.
    var rules = event.rules_fired || [];
    var ruleW = profile.rule_weights || {};
    for (var i = 0; i < rules.length; i++) {
      var rw = ruleW[rules[i]];
      if (rw != null) score += rw;
    }
    // Suburb tier bonus.
    var suburbW = (profile.suburb_weights || {})[event.suburb_tier];
    if (suburbW != null) score += suburbW;
    // Subcategory tier bonus — average across the event's tags (not sum)
    // so multi-tagged events can't compound a single love bonus into a
    // dominant score. Mirrors the Python recommender.
    var subs = event.subcategories || [];
    var tierMap = profile.subcategory_tiers || {};
    var tierBonuses = profile.tier_bonuses || {};
    if (subs.length > 0) {
      var tbSum = 0, tbCount = 0;
      for (var j = 0; j < subs.length; j++) {
        var tier = tierMap[subs[j]] || 'neutral';
        var tb = tierBonuses[tier];
        if (tb != null) { tbSum += tb; tbCount++; }
      }
      if (tbCount > 0) score += tbSum / tbCount;
    }
    return score;
  }

  function isPinned(event, profile) {
    // Matches Python: priority_venue pins, but generic_dating un-pins.
    // `profile.pinning_rules` is already filtered by rule_states at
    // merge time — a rule whose state is 'on' or 'off' is excluded
    // there, so no extra check needed here.
    var rules = event.rules_fired || [];
    if (rules.indexOf('generic_dating') !== -1) return false;
    var pinRules = profile.pinning_rules || [];
    for (var i = 0; i < pinRules.length; i++) {
      if (rules.indexOf(pinRules[i]) !== -1) return true;
    }
    return false;
  }

  // ============================================================
  //  Diversity selection — JS port of recommend._select_with_diversity
  // ============================================================
  function penaltySubcategorySet(event) {
    // Same logic as recommend._penalty_subcategories: the displayed
    // subcategory list minus "misc" (two misc events shouldn't penalise
    // each other for sharing nothing in particular).
    var s = new Set(event.subcategories || []);
    s.delete('misc');
    return s;
  }

  function subsetsOverlap(a, b) {
    // Any-overlap check. Iterate the smaller set for tiny speedup.
    var small, big;
    if (a.size <= b.size) { small = a; big = b; } else { small = b; big = a; }
    var iter = small.values();
    var step = iter.next();
    while (!step.done) {
      if (big.has(step.value)) return true;
      step = iter.next();
    }
    return false;
  }

  function diversityPenaltyFor(event, priorCats, priorSubSets, profile) {
    var penalty = 0;
    var cat = (event.category || '').toLowerCase();
    if (cat) {
      var catPairs = 0;
      for (var i = 0; i < priorCats.length; i++) {
        if (priorCats[i] === cat) catPairs++;
      }
      penalty += (profile.diversity_category || 0) * catPairs;
    }
    var candidateSubs = penaltySubcategorySet(event);
    if (candidateSubs.size > 0) {
      var subPairs = 0;
      for (var k = 0; k < priorSubSets.length; k++) {
        if (subsetsOverlap(candidateSubs, priorSubSets[k])) subPairs++;
      }
      penalty += (profile.diversity_subcategory || 0) * subPairs;
    }
    return penalty;
  }

  function selectWithDiversity(block, profile) {
    // block: array of {event, score, pinned} — pinned first, then greedy
    // diversity pick until best-adjusted score drops below the floor
    // or the safety cap kicks in.
    var pinned = [];
    var rest = [];
    for (var i = 0; i < block.length; i++) {
      if (block[i].pinned) pinned.push(block[i]); else rest.push(block[i]);
    }
    var selected = [];
    var priorCats = [];
    var priorSubs = [];

    function bump(item) {
      var cat = (item.event.category || '').toLowerCase();
      if (cat) priorCats.push(cat);
      priorSubs.push(penaltySubcategorySet(item.event));
    }

    pinned.sort(function (a, b) { return b.score - a.score; });
    for (var p = 0; p < pinned.length; p++) {
      selected.push(pinned[p]);
      bump(pinned[p]);
    }

    var cap = profile.block_safety_cap || 15;
    var floor = profile.score_floor != null ? profile.score_floor : 0;

    while (rest.length > 0 && selected.length < cap) {
      var bestIdx = -1;
      var bestAdj = -Infinity;
      for (var j = 0; j < rest.length; j++) {
        var adj = rest[j].score -
          diversityPenaltyFor(rest[j].event, priorCats, priorSubs, profile);
        if (adj > bestAdj) {
          bestAdj = adj;
          bestIdx = j;
        }
      }
      if (bestAdj < floor) break;
      var winner = rest.splice(bestIdx, 1)[0];
      selected.push(winner);
      bump(winner);
    }

    selected.sort(function (a, b) { return b.score - a.score; });
    return selected;
  }

  // ============================================================
  //  Build ranking — rank_window equivalent
  // ============================================================
  function buildRanking(profile) {
    // Group scored+pinned items by (day, category)
    var byDayCat = {};
    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      var day = ev.day;
      var cat = ev.category;
      if (!day || !cat) continue;
      if (!byDayCat[day]) byDayCat[day] = {};
      if (!byDayCat[day][cat]) byDayCat[day][cat] = [];
      byDayCat[day][cat].push({
        event: ev,
        score: scoreEvent(ev, profile),
        pinned: isPinned(ev, profile),
        is_expanded: false,
      });
    }

    // Select per (day, cat); build expanded set; URL-dedupe across week.
    var seenUrls = new Set();
    var result = {};
    var days = Object.keys(byDayCat).sort();
    var floor = profile.score_floor != null ? profile.score_floor : 0;

    for (var d = 0; d < days.length; d++) {
      var day = days[d];
      result[day] = {};
      for (var c = 0; c < CATEGORY_ORDER.length; c++) {
        var catKey = CATEGORY_ORDER[c];
        var block = byDayCat[day][catKey];
        if (!block || block.length === 0) continue;

        var curated = selectWithDiversity(block, profile);
        var curatedIds = {};
        for (var m = 0; m < curated.length; m++) {
          curatedIds[curated[m].event.id] = true;
        }
        var extras = [];
        for (var n = 0; n < block.length; n++) {
          if (!curatedIds[block[n].event.id] && block[n].score > floor) {
            extras.push({
              event: block[n].event,
              score: block[n].score,
              pinned: block[n].pinned,
              is_expanded: true,
            });
          }
        }
        extras.sort(function (a, b) { return b.score - a.score; });

        var combined = curated.concat(extras);
        var kept = [];
        for (var q = 0; q < combined.length; q++) {
          var url = (combined[q].event.url || '').trim();
          if (url && seenUrls.has(url)) continue;
          if (url) seenUrls.add(url);
          kept.push(combined[q]);
        }
        if (kept.length > 0) {
          result[day][catKey] = kept;
        }
      }
    }
    return result;
  }

  // ============================================================
  //  DOM build — tabs, day panels, category sections, event cards
  // ============================================================
  function displaySortKey(item) {
    // Same fields as recommend._display_sort_key. `is_expanded` is
    // handled by splitting into curated/expanded before sorting, so
    // it's omitted here — within a group, sort by TBD-flag, venue,
    // subcategory, name.
    var ev = item.event;
    var venue = (ev.venue || '').toLowerCase();
    var sub = (ev.subcategory || '').toLowerCase();
    var name = (ev.title || '').toLowerCase();
    return [venue === 'tbd' ? 1 : 0, venue, sub, name];
  }

  function compareKeys(a, b) {
    for (var i = 0; i < a.length; i++) {
      if (a[i] < b[i]) return -1;
      if (a[i] > b[i]) return 1;
    }
    return 0;
  }

  function sortForDisplay(items) {
    var withKey = items.map(function (it) {
      return { item: it, key: displaySortKey(it) };
    });
    withKey.sort(function (a, b) { return compareKeys(a.key, b.key); });
    return withKey.map(function (wk) { return wk.item; });
  }

  function renderEventHtml(item) {
    var ev = item.event;
    var cls = item.is_expanded ? 'event extra' : 'event';
    var parts = ['<article class="' + cls + '">'];
    if (ev.venue) parts.push('<div class="venue">' + escapeHtml(ev.venue) + '</div>');
    if (ev.suburb) parts.push('<div class="suburb">' + escapeHtml(ev.suburb) + '</div>');
    parts.push(
      '<a class="title" href="' + escapeHtml(ev.url) + '" ' +
      'target="_blank" rel="noopener">' + escapeHtml(ev.title) + '</a>'
    );
    if (ev.time_display) {
      parts.push('<div class="time">' + escapeHtml(ev.time_display) + '</div>');
    }
    var blurb = ev.context_line || ev.description_summary;
    if (blurb) {
      parts.push('<div class="description">' + escapeHtml(blurb) + '</div>');
    }
    if (ev.price) {
      var low = ev.price.toLowerCase();
      var pcls = (low === 'free' || low === 'free event') ? 'price free' : 'price';
      parts.push('<div class="' + pcls + '">' + escapeHtml(ev.price) + '</div>');
    }
    parts.push('<div class="score-debug">score ' + item.score.toFixed(2) + '</div>');
    var badges = [];
    var subs = ev.subcategories || [];
    for (var i = 0; i < subs.length; i++) {
      badges.push('<span class="pill subcategory">#' + escapeHtml(subs[i]) + '</span>');
    }
    if (ev.date_idea) badges.push('<span class="pill date-idea">date idea</span>');
    if (badges.length) parts.push('<div class="badges">' + badges.join('') + '</div>');
    parts.push('</article>');
    return parts.join('\n');
  }

  function renderCategoryHtml(catKey, block) {
    var curated = [], expanded = [];
    for (var i = 0; i < block.length; i++) {
      (block[i].is_expanded ? expanded : curated).push(block[i]);
    }
    if (curated.length === 0 && expanded.length === 0) return '';
    curated = sortForDisplay(curated);
    expanded = sortForDisplay(expanded);
    var display = CATEGORY_DISPLAY[catKey] || catKey;

    var parts = [
      '<section class="category">',
      '<h3 class="category-header">' + escapeHtml(display) +
        '<span class="count">' + curated.length + '</span></h3>',
      '<div class="events">\n' + curated.map(renderEventHtml).join('\n') + '\n</div>',
    ];
    if (expanded.length > 0) {
      parts.push(
        '<button class="show-more" type="button" aria-expanded="false">' +
        'Show ' + expanded.length + ' more' +
        '</button>'
      );
      parts.push(
        '<div class="events events-expanded" hidden>\n' +
        expanded.map(renderEventHtml).join('\n') + '\n</div>'
      );
    }
    parts.push('</section>');
    return parts.join('\n');
  }

  function renderDayHtml(dayIso, byCatMap) {
    var heading = formatDayHeading(dayIso);
    var daySlug = slugify(heading);
    var sections = [];
    for (var i = 0; i < CATEGORY_ORDER.length; i++) {
      var catKey = CATEGORY_ORDER[i];
      var block = byCatMap[catKey];
      if (!block || block.length === 0) continue;
      var section = renderCategoryHtml(catKey, block);
      if (section) sections.push(section);
    }
    if (sections.length === 0) return '';
    // Always render `hidden`; activation flips the selected panel.
    return (
      '<section class="day" id="day-' + daySlug + '" role="tabpanel" ' +
      'aria-labelledby="tab-' + daySlug + '" hidden>\n' +
      '<h2 class="day-heading">' + escapeHtml(heading) + '</h2>\n' +
      sections.join('\n') + '\n' +
      '</section>'
    );
  }

  function renderTabsHtml(days, dayCounts) {
    var buttons = [];
    for (var i = 0; i < days.length; i++) {
      var heading = formatDayHeading(days[i]);
      var daySlug = slugify(heading);
      var date = heading.substring(dayShort(heading).length).trim();
      var count = dayCounts[days[i]] || 0;
      buttons.push(
        '<button class="day-tab" role="tab" id="tab-' + daySlug + '" ' +
        'aria-controls="day-' + daySlug + '" ' +
        'aria-selected="false" tabindex="-1" ' +
        'data-tab="' + daySlug + '">' +
          '<span class="tab-weekday">' + escapeHtml(dayShort(heading)) + '</span>' +
          '<span class="tab-date">' + escapeHtml(date) + '</span>' +
          '<span class="tab-count" aria-label="' + count + ' events">' +
            count + '</span>' +
        '</button>'
      );
    }
    // Visual divider + Settings tab at the end. The gear + label stays
    // sticky in the header, so Settings is always one click away.
    buttons.push('<span class="tab-divider" aria-hidden="true"></span>');
    buttons.push(
      '<button class="day-tab settings-tab" role="tab" id="tab-settings" ' +
      'aria-controls="settings-view" aria-selected="false" tabindex="-1" ' +
      'data-tab="settings">' +
        '<span class="settings-gear" aria-hidden="true">⚙</span>' +
        '<span>Settings</span>' +
        '<span class="settings-badge" hidden>0</span>' +
      '</button>'
    );
    return buttons.join('\n');
  }

  function computeDayCounts(ranking) {
    var counts = {};
    for (var day in ranking) {
      var n = 0;
      for (var cat in ranking[day]) n += ranking[day][cat].length;
      counts[day] = n;
    }
    return counts;
  }

  // ============================================================
  //  Settings view — subcategory tiers + sub-tab shell
  // ============================================================
  var TIERS = ['love', 'like', 'neutral', 'avoid'];
  var TIER_LABELS = { love: 'Love', like: 'Like', neutral: 'Neutral', avoid: 'Avoid' };

  function renderSubcatRow(tag) {
    var tier = (profile.subcategory_tiers || {})[tag] || 'neutral';
    var chips = TIERS.map(function (t) {
      return (
        '<button type="button" class="tri" data-value="' + t + '" ' +
        'aria-pressed="' + (t === tier ? 'true' : 'false') + '">' +
          TIER_LABELS[t] +
        '</button>'
      );
    }).join('');
    return (
      '<div class="subcat-row" data-subcat="' + escapeHtml(tag) + '">' +
        '<span class="subcat-name">' + escapeHtml(tag) + '</span>' +
        '<div class="tri-state" role="radiogroup" aria-label="' +
          escapeHtml(tag) + ' tier">' + chips + '</div>' +
      '</div>'
    );
  }

  function renderSubcatGroups() {
    var tax = profile.subcategory_taxonomy || {};
    var parts = [
      '<p class="facet-intro">Subcategories are discrete tags an extractor ' +
      'assigns to each event (jazz, yoga, cooking, shibari, etc.). They ' +
      'answer <em>what is this event</em>, whereas facets answer <em>what ' +
      'does it feel like</em>. Use these for specific genre / style / ' +
      'technique preferences you have within a category. <strong>Love' +
      '</strong> promotes events with that tag, <strong>Avoid</strong> ' +
      'demotes them. Bonuses are averaged across an event\'s tags.</p>'
    ];
    for (var i = 0; i < CATEGORY_ORDER.length; i++) {
      var catKey = CATEGORY_ORDER[i];
      var tags = tax[catKey];
      if (!tags || !tags.length) continue;
      var display = CATEGORY_DISPLAY[catKey] || catKey;
      var rows = tags.map(renderSubcatRow).join('\n');
      parts.push(
        '<div class="subcat-group">' +
          '<h4 class="subcat-group-heading">' + escapeHtml(display) + '</h4>' +
          rows +
        '</div>'
      );
    }
    return parts.join('\n');
  }

  function renderFacetRow(name, blurb) {
    var tier = (profile.facet_tiers || {})[name] || 'neutral';
    var chips = TIERS.map(function (t) {
      return (
        '<button type="button" class="tri" data-value="' + t + '" ' +
        'aria-pressed="' + (t === tier ? 'true' : 'false') + '">' +
          TIER_LABELS[t] +
        '</button>'
      );
    }).join('');
    var displayName = name
      .replace(/_/g, ' ')
      .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    return (
      '<div class="facet-row" data-facet="' + escapeHtml(name) + '">' +
        '<div class="facet-label">' +
          '<span class="facet-name">' + escapeHtml(displayName) + '</span>' +
          '<span class="facet-blurb">' + escapeHtml(blurb || '') + '</span>' +
        '</div>' +
        '<div class="tri-state" role="radiogroup" aria-label="' +
          escapeHtml(name) + ' tier">' + chips + '</div>' +
      '</div>'
    );
  }

  // --- Rules sub-tab --------------------------------------------------
  var RULE_META = {
    priority_venue:   { label: 'Priority venue',
      hint: 'Pin: always show these events. On: favour these events. Off: no effect.' },
    priority_artist:  { label: 'Priority artist',
      hint: 'Pin: always show these events. On: favour these events. Off: no effect.' },
    body_based:       { label: 'Body-based practice',
      hint: 'Reward events tagged with body-based subcategories (shibari, tantra, breathwork, etc).' },
    interest_tag:     { label: 'General interest tag',
      hint: 'Reward general interest tags Sonnet applied that don\'t fit a specific category.' },
    special_event:    { label: 'Special / rare event',
      hint: 'Reward one-off specials, album launches, premieres, limited-run programs.' },
    curated_source:   { label: 'Curated source',
      hint: 'Reward events from small, curated single-venue sources (more likely to be strong picks).' },
    generic_dating:   { label: 'Generic-dating penalty',
      hint: 'Penalise plain dating events (non-poly) hard enough to drop them below the floor.' },
    negative_keyword: { label: 'Negative-keyword filter',
      hint: 'Penalise events matching explicit acronyms (AGM, PhD confirmation, etc).' },
  };

  var PIN_CAPABLE_SET = {};
  (defaultProfile.pin_capable_rules || []).forEach(function (r) {
    PIN_CAPABLE_SET[r] = true;
  });

  function renderPinTriChips(state) {
    var chips = [
      { v: 'pin', label: 'Pin' },
      { v: 'on',  label: 'On'  },
      { v: 'off', label: 'Off' },
    ];
    return chips.map(function (c) {

    }).join('');
  }

  function renderRuleRow(ruleName, weight) {
    var meta = RULE_META[ruleName] || { label: ruleName, hint: '' };
    var state = (profile.rule_states || {})[ruleName] || 'on';
    var sign = weight >= 0 ? '+' : '';
    var control;
    if (PIN_CAPABLE_SET[ruleName]) {
      control = (
        '<div class="tri-state" role="radiogroup" aria-label="' +
          escapeHtml(ruleName) + ' state">' +
          renderPinTriChips(state) +
        '</div>'
      );
    } else {
      var enabled = state !== 'off';
      control = (
        '<button type="button" class="rule-toggle" aria-pressed="' +
          (enabled ? 'true' : 'false') + '">' +
          (enabled ? 'On' : 'Off') +
        '</button>'
      );
    }
    return (
      '<div class="rule-row" data-rule="' + escapeHtml(ruleName) + '">' +
        '<div class="rule-text">' +
          '<span class="rule-name">' + escapeHtml(meta.label) +
            '<span class="rule-weight">' + sign + weight.toFixed(2) + '</span>' +
          '</span>' +
          '<span class="rule-hint">' + escapeHtml(meta.hint) + '</span>' +
        '</div>' +
        control +
      '</div>'
    );
  }

  function renderRulesPanel() {
    var defaults = defaultProfile.rule_weights || {};
    var rows = [];
    for (var r in defaults) {
      rows.push(renderRuleRow(r, defaults[r]));
    }
    return (
      '<p class="facet-intro">Rules are boolean signals the server computes ' +
      'per event. <strong>Priority venue</strong> and <strong>Priority artist' +
      '</strong> can additionally <em>pin</em> their events above the score ' +
      'floor (use the third chip). Every other rule is a simple on/off.</p>' +
      '<div class="subcat-group">' + rows.join('\n') + '</div>'
    );
  }

  // --- Shape sub-tab --------------------------------------------------
  var SHAPE_FIELDS = [
    { key: 'score_floor',        label: 'Score floor',
      hint: 'Events with a score below this are hidden entirely. Raise it to tighten.',
      min: -0.5, max: 1.0, step: 0.05 },
    { key: 'diversity_category', label: 'Category spread',
      hint: 'Per-pair penalty when two picks share the same category. Higher = more category mix.',
      min: 0, max: 0.3, step: 0.01 },
    { key: 'diversity_subcategory', label: 'Subcategory spread',
      hint: 'Per-pair penalty when two picks share any subcategory. Higher = more variety within a category.',
      min: 0, max: 0.3, step: 0.01 },
    { key: 'love_bonus',  label: 'Love tier bonus',
      hint: 'Score added for a "loved" subcategory tag (averaged across an event\'s tags).',
      min: 0, max: 0.6, step: 0.02 },
    { key: 'like_bonus',  label: 'Like tier bonus',
      hint: 'Score added for a "liked" subcategory tag (averaged across an event\'s tags).',
      min: 0, max: 0.4, step: 0.02 },
    { key: 'avoid_bonus', label: 'Avoid tier penalty',
      hint: 'Score subtracted for an "avoided" subcategory tag (averaged across an event\'s tags; must be negative to demote).',
      min: -0.6, max: 0, step: 0.02 },
  ];

  function shapeValue(field) {
    if (field === 'score_floor') return profile.score_floor;
    if (field === 'diversity_category') return profile.diversity_category;
    if (field === 'diversity_subcategory') return profile.diversity_subcategory;
    if (field === 'love_bonus')  return (profile.tier_bonuses || {}).love;
    if (field === 'like_bonus')  return (profile.tier_bonuses || {}).like;
    if (field === 'avoid_bonus') return (profile.tier_bonuses || {}).avoid;
    return 0;
  }

  function renderShapeRow(f) {
    var v = shapeValue(f.key);
    if (v == null) v = 0;
    return (
      '<div class="shape-row" data-shape="' + f.key + '">' +
        '<div class="shape-text">' +
          '<span class="shape-name">' + escapeHtml(f.label) + '</span>' +
          '<span class="shape-hint">' + escapeHtml(f.hint) + '</span>' +
        '</div>' +
        '<div class="shape-input">' +
          '<input type="range" data-shape="' + f.key + '" ' +
            'min="' + f.min + '" max="' + f.max + '" step="' + f.step + '" ' +
            'value="' + v + '">' +
          '<span class="shape-value">' + v.toFixed(2) + '</span>' +
        '</div>' +
      '</div>'
    );
  }

  function renderShapePanel() {
    var rows = SHAPE_FIELDS.map(renderShapeRow).join('\n');
    return (
      '<p class="facet-intro">Shape controls affect the ranking overall ' +
      'rather than any single event. Changes apply live.</p>' +
      '<div class="subcat-group">' + rows + '</div>'
    );
  }

  function renderFacetGroups() {
    var blurbs = profile.facet_blurbs || {};
    var rows = [];
    for (var name in blurbs) {
      rows.push(renderFacetRow(name, blurbs[name]));
    }
    if (!rows.length) {
      return '<div class="settings-placeholder">No facets in profile.</div>';
    }
    return (
      '<p class="facet-intro">Facets match each event against a <em>vibe' +
      '</em> &mdash; a recognisable event feel (meditation-y, corporate-' +
      'y, avant-garde-y, etc.) rather than a concrete category. Each row ' +
      'below asks: <em>does this event read like this vibe?</em>. Set ' +
      '<strong>Love</strong> to surface matching events, <strong>Avoid' +
      '</strong> to demote them, <strong>Neutral</strong> to ignore the ' +
      'facet. Defaults reflect Gary\'s preferences &mdash; flip any ' +
      'facet either direction to match yours.</p>' +
      '<div class="subcat-group">' +
        rows.join('\n') +
      '</div>'
    );
  }

  function renderSettingsView() {
    var view = document.getElementById('settings-view');
    if (!view) return;
    view.innerHTML = (
      '<nav class="settings-subtabs" role="tablist" aria-label="Settings sections">' +
        '<button class="settings-subtab" role="tab" data-subtab="subcategories" ' +
          'aria-selected="true">Subcategories</button>' +
        '<button class="settings-subtab" role="tab" data-subtab="facets" ' +
          'aria-selected="false">Facets</button>' +
        '<button class="settings-subtab" role="tab" data-subtab="rules" ' +
          'aria-selected="false">Rules</button>' +
        '<button class="settings-subtab" role="tab" data-subtab="shape" ' +
          'aria-selected="false">Shape</button>' +
      '</nav>' +
      '<div class="settings-preview-row">' +
        '<span class="settings-hint">Changes apply instantly. ' +
          'Day tab counts update as you tier.</span>' +
        '<button class="settings-preview-btn" type="button" ' +
          'data-action="preview">Back to last day</button>' +
      '</div>' +
      '<div class="settings-panel" data-subtab="subcategories">' +
        renderSubcatGroups() +
        '<div class="settings-actions">' +
          '<button class="settings-action" type="button" ' +
            'data-action="reset-subcategories">Reset all subcategories</button>' +
        '</div>' +
      '</div>' +
      '<div class="settings-panel" data-subtab="facets" hidden>' +
        renderFacetGroups() +
        '<div class="settings-actions">' +
          '<button class="settings-action" type="button" ' +
            'data-action="reset-facets">Reset all facets</button>' +
        '</div>' +
      '</div>' +
      '<div class="settings-panel" data-subtab="rules" hidden>' +
        renderRulesPanel() +
        '<div class="settings-actions">' +
          '<button class="settings-action" type="button" ' +
            'data-action="reset-rules">Reset all rules</button>' +
        '</div>' +
      '</div>' +
      '<div class="settings-panel" data-subtab="shape" hidden>' +
        renderShapePanel() +
        '<div class="settings-actions">' +
          '<button class="settings-action" type="button" ' +
            'data-action="reset-shape">Reset shape</button>' +
        '</div>' +
      '</div>'
    );
  }

  function rerenderSettingsPreservingSubtab() {
    // renderSettingsView rebuilds the whole Settings DOM with
    // Subcategories as the hard-coded default; snapshot whichever
    // sub-tab is currently visible and re-activate it afterwards so
    // Reset-* buttons don't yank the user back to Subcategories.
    var current = document.querySelector('.settings-subtab[aria-selected="true"]');
    var name = (current && current.dataset.subtab) || 'subcategories';
    renderSettingsView();
    switchSubtab(name);
  }

  function updateSettingsBadge() {
    // Count customisations = tiers/rules/shape knobs that differ from
    // the shipped defaults. Both subcategory_tiers and facet_tiers ship
    // a per-key default; diff is "current tier != default tier".
    var count = 0;
    var subtiers = profile.subcategory_tiers || {};
    var defaultSubtiers = defaultProfile.subcategory_tiers || {};
    for (var k in subtiers) {
      var def = defaultSubtiers[k] || 'neutral';
      if (subtiers[k] !== def) count++;
    }
    for (var d in defaultSubtiers) {
      if (!(d in subtiers)) {
        if ((defaultSubtiers[d] || 'neutral') !== 'neutral') count++;
      }
    }
    var ftiers = profile.facet_tiers || {};
    var defaultFtiers = defaultProfile.facet_tiers || {};
    for (var fk in ftiers) {
      var fdef = defaultFtiers[fk] || 'neutral';
      if (ftiers[fk] !== fdef) count++;
    }
    for (var fd in defaultFtiers) {
      if (!(fd in ftiers)) {
        if ((defaultFtiers[fd] || 'neutral') !== 'neutral') count++;
      }
    }
    // Rule states differing from defaults
    var curStates = profile.rule_states || {};
    var defStates = defaultProfile.rule_states || {};
    for (var rs in curStates) {
      var def = defStates[rs] || 'on';
      if (curStates[rs] !== def) count++;
    }
    // Shape overrides differing from defaults
    var shapeFields = ['score_floor', 'diversity_category', 'diversity_subcategory'];
    for (var si = 0; si < shapeFields.length; si++) {
      var f = shapeFields[si];
      if (profile[f] != null && profile[f] !== defaultProfile[f]) count++;
    }
    var curTb = profile.tier_bonuses || {};
    var defTb = defaultProfile.tier_bonuses || {};
    var tierKeys = ['love', 'like', 'avoid'];
    for (var tk = 0; tk < tierKeys.length; tk++) {
      if (curTb[tierKeys[tk]] != null && curTb[tierKeys[tk]] !== defTb[tierKeys[tk]]) count++;
    }
    var badge = document.querySelector('.settings-badge');
    if (!badge) return;
    badge.textContent = count;
    badge.hidden = count === 0;
  }

  // ============================================================
  //  Activation — one source of truth for which panel is visible
  // ============================================================
  function activate(tabName, opts) {
    opts = opts || {};
    if (!tabName) return;
    var tabBtn = document.querySelector('[data-tab="' + tabName + '"]');
    if (!tabBtn) return;

    activeTab = tabName;
    if (tabName !== 'settings') {
      lastDayTab = tabName;
      try { sessionStorage.setItem(SESSION_LAST_DAY, tabName); } catch (_) {}
    }

    var allTabs = document.querySelectorAll('.day-tab');
    for (var i = 0; i < allTabs.length; i++) {
      var match = allTabs[i].dataset.tab === tabName;
      allTabs[i].setAttribute('aria-selected', match ? 'true' : 'false');
      allTabs[i].tabIndex = match ? 0 : -1;
    }

    var dayPanels = document.querySelectorAll('.day');
    for (var j = 0; j < dayPanels.length; j++) {
      dayPanels[j].hidden = (dayPanels[j].id !== 'day-' + tabName);
    }
    var settingsView = document.getElementById('settings-view');
    if (settingsView) settingsView.hidden = tabName !== 'settings';

    if (opts.focus) tabBtn.focus();
    if (opts.updateHash) {
      var hash = tabName === 'settings' ? '#settings' : '#day-' + tabName;
      if (location.hash !== hash) history.replaceState(null, '', hash);
    }
    // Expanding the header (no resize event) would otherwise leave
    // --header-offset stale; recompute after any activation in case
    // layout shifted.
    syncHeaderOffset();
  }

  var siteHeader = document.querySelector('.site-header');
  function syncHeaderOffset() {
    if (!siteHeader) return;
    document.documentElement.style.setProperty(
      '--header-offset', siteHeader.offsetHeight + 'px'
    );
  }

  function firstAvailableDayTab() {
    var t = document.querySelector('.day-tab:not(.settings-tab)');
    return t ? t.dataset.tab : null;
  }

  // ============================================================
  //  Render orchestration
  // ============================================================
  function rebuildDayPanels(ranking, days) {
    var mainEl = document.getElementById('main');
    if (!mainEl) return;
    // Remove existing .day nodes (but keep settings-view intact — its
    // chip state + scroll position are client-local and shouldn't be
    // wiped every time we re-rank).
    var existing = mainEl.querySelectorAll('.day');
    for (var i = 0; i < existing.length; i++) existing[i].remove();
    var settingsView = document.getElementById('settings-view');
    var tpl = document.createElement('div');
    for (var j = 0; j < days.length; j++) {
      var h = renderDayHtml(days[j], ranking[days[j]]);
      if (!h) continue;
      tpl.innerHTML = h;
      var dayEl = tpl.firstElementChild;
      if (!dayEl) continue;
      if (settingsView && settingsView.parentNode === mainEl) {
        mainEl.insertBefore(dayEl, settingsView);
      } else {
        mainEl.appendChild(dayEl);
      }
    }
  }

  function renderAll() {
    var ranking = buildRanking(profile);
    var days = [];
    var candidates = Object.keys(ranking).sort();
    for (var i = 0; i < candidates.length; i++) {
      var day = candidates[i];
      var hasAny = false;
      for (var catKey in ranking[day]) {
        if (ranking[day][catKey].length > 0) { hasAny = true; break; }
      }
      if (hasAny) days.push(day);
    }

    var dayCounts = computeDayCounts(ranking);

    var tabsEl = document.querySelector('.day-tabs');
    if (tabsEl) tabsEl.innerHTML = renderTabsHtml(days, dayCounts);

    rebuildDayPanels(ranking, days);
    updateSettingsBadge();

    // Reactivate whichever tab was active. If it disappeared under the
    // new profile (unlikely — only happens if the day has no events),
    // fall back to the first available day or 'settings' if that was
    // the prior state.
    var target = activeTab;
    if (target && target !== 'settings' &&
        !document.querySelector('[data-tab="' + target + '"]')) {
      target = firstAvailableDayTab();
    }
    activate(target || firstAvailableDayTab(), {});
  }

  // ============================================================
  //  Delegated event handlers — tabs, sub-tabs, chips, buttons
  // ============================================================
  function handleTierChange(tag, tier) {
    // Always set explicitly (including 'neutral') so a user's explicit
    // choice overrides the seeded default. Relying on delete would let
    // the merged default leak back in.
    profile.subcategory_tiers = profile.subcategory_tiers || {};
    profile.subcategory_tiers[tag] = tier;
    saveProfile();
    var rows = document.querySelectorAll('.subcat-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.subcat === tag) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === tier ? 'true' : 'false');
        }
      }
    }
    renderAll();
  }

  function applyRuleState(ruleName, newState) {
    // Canonical update: rule_states, rule_weights, and effective
    // pinning_rules all move together. Returns the applied state.
    profile.rule_states = profile.rule_states || {};
    profile.rule_states[ruleName] = newState;

    var defaults = defaultProfile.rule_weights || {};
    profile.rule_weights[ruleName] = (newState === 'off')
      ? 0
      : defaults[ruleName];

    var capable = defaultProfile.pin_capable_rules || [];
    if (capable.indexOf(ruleName) !== -1) {
      var list = (profile.pinning_rules || []).filter(
        function (r) { return r !== ruleName; });
      if (newState === 'pin') list.push(ruleName);
      profile.pinning_rules = list;
    }
    return newState;
  }

  function handleRuleToggle(ruleName) {
    // Simple on/off for non-pin-capable rules.
    var current = (profile.rule_states || {})[ruleName] || 'on';
    var next = current === 'off' ? 'on' : 'off';
    applyRuleState(ruleName, next);
    var rows = document.querySelectorAll('.rule-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.rule === ruleName) {
        var btn = rows[i].querySelector('.rule-toggle');
        if (btn) {
          btn.setAttribute('aria-pressed', next === 'on' ? 'true' : 'false');
          btn.textContent = next === 'on' ? 'On' : 'Off';
        }
      }
    }
    saveProfile();
    renderAll();
  }

  function handleRuleStateChip(ruleName, newState) {
    // Tri-state (Pin/On/Off) for pin-capable rules.
    applyRuleState(ruleName, newState);
    var rows = document.querySelectorAll('.rule-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.rule === ruleName) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === newState ? 'true' : 'false');
        }
      }
    }
    saveProfile();
    renderAll();
  }

  function handleShapeChange(field, value) {
    var v = parseFloat(value);
    if (isNaN(v)) return;
    if (field === 'score_floor') profile.score_floor = v;
    else if (field === 'diversity_category') profile.diversity_category = v;
    else if (field === 'diversity_subcategory') profile.diversity_subcategory = v;
    else if (field === 'love_bonus' || field === 'like_bonus' || field === 'avoid_bonus') {
      // Clone so the tier_bonuses dict isn't shared with defaults.
      profile.tier_bonuses = Object.assign({}, profile.tier_bonuses || {});
      if (field === 'love_bonus')  profile.tier_bonuses.love  = v;
      if (field === 'like_bonus')  profile.tier_bonuses.like  = v;
      if (field === 'avoid_bonus') profile.tier_bonuses.avoid = v;
    }
    // Update value display for this row without disturbing the slider.
    var row = document.querySelector('.shape-row[data-shape="' + field + '"]');
    if (row) {
      var disp = row.querySelector('.shape-value');
      if (disp) disp.textContent = v.toFixed(2);
    }
    saveProfile();
    renderAll();
  }

  function handleFacetTierChange(name, tier) {
    profile.facet_tiers = profile.facet_tiers || {};
    profile.facet_tiers[name] = tier;
    saveProfile();
    var rows = document.querySelectorAll('.facet-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.facet === name) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === tier ? 'true' : 'false');
        }
      }
    }
    renderAll();
  }

  function switchSubtab(name) {
    var subtabs = document.querySelectorAll('.settings-subtab');
    for (var i = 0; i < subtabs.length; i++) {
      subtabs[i].setAttribute('aria-selected',
        subtabs[i].dataset.subtab === name ? 'true' : 'false');
    }
    var panels = document.querySelectorAll('.settings-panel');
    for (var j = 0; j < panels.length; j++) {
      panels[j].hidden = panels[j].dataset.subtab !== name;
    }
  }

  function toggleShowMore(btn) {
    var panel = btn.nextElementSibling;
    if (!panel || !panel.classList.contains('events-expanded')) return;
    var expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    panel.hidden = expanded;
    if (!btn.dataset.initialLabel) btn.dataset.initialLabel = btn.textContent;
    btn.textContent = expanded ? btn.dataset.initialLabel : 'Show fewer';
  }

  document.addEventListener('click', function (e) {
    var tab = e.target.closest && e.target.closest('.day-tab');
    if (tab) { activate(tab.dataset.tab, { updateHash: true }); return; }

    var subtab = e.target.closest && e.target.closest('.settings-subtab');
    if (subtab) { switchSubtab(subtab.dataset.subtab); return; }

    var chip = e.target.closest && e.target.closest('.tri');
    if (chip) {
      var subRow = chip.closest('.subcat-row');
      if (subRow) {
        handleTierChange(subRow.dataset.subcat, chip.dataset.value);
        return;
      }
      var facetRow = chip.closest('.facet-row');
      if (facetRow) {
        handleFacetTierChange(facetRow.dataset.facet, chip.dataset.value);
        return;
      }
      var ruleRowChip = chip.closest('.rule-row');
      if (ruleRowChip) {
        handleRuleStateChip(ruleRowChip.dataset.rule, chip.dataset.value);
        return;
      }
    }

    var ruleBtn = e.target.closest && e.target.closest('.rule-toggle');
    if (ruleBtn) {
      var rRow = ruleBtn.closest('.rule-row');
      if (rRow) handleRuleToggle(rRow.dataset.rule);
      return;
    }

    var showMore = e.target.closest && e.target.closest('.show-more');
    if (showMore) { toggleShowMore(showMore); return; }

    var action = e.target.closest && e.target.closest('[data-action]');
    if (action) {
      if (action.dataset.action === 'preview') {
        var target = lastDayTab || firstAvailableDayTab();
        if (target) activate(target, { updateHash: true });
      } else if (action.dataset.action === 'reset-subcategories') {
        // Reset to the shipped defaults (not empty) so the baseline
        // taste seeding is restored.
        var base = defaultProfile.subcategory_tiers || {};
        profile.subcategory_tiers = {};
        for (var rk in base) profile.subcategory_tiers[rk] = base[rk];
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-facets') {
        var fbase = defaultProfile.facet_tiers || {};
        profile.facet_tiers = {};
        for (var fk in fbase) profile.facet_tiers[fk] = fbase[fk];
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-rules') {
        profile.rule_states = Object.assign({}, defaultProfile.rule_states || {});
        profile.rule_weights = Object.assign({}, defaultProfile.rule_weights || {});
        profile.pinning_rules = (defaultProfile.pinning_rules || []).slice();
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-shape') {
        profile.score_floor = defaultProfile.score_floor;
        profile.diversity_category = defaultProfile.diversity_category;
        profile.diversity_subcategory = defaultProfile.diversity_subcategory;
        profile.tier_bonuses = Object.assign({}, defaultProfile.tier_bonuses || {});
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      }
      return;
    }
  });

  // Shape sliders emit 'input' while dragging and 'change' on release.
  // Update the value display live on every 'input' for tight feedback,
  // but only re-rank on 'change' so we don't rebuild the DOM 60×/second.
  document.addEventListener('input', function (e) {
    if (!e.target.matches || !e.target.matches('.shape-input input[type="range"]')) return;
    var row = e.target.closest('.shape-row');
    if (!row) return;
    var disp = row.querySelector('.shape-value');
    if (disp) disp.textContent = parseFloat(e.target.value).toFixed(2);
  });
  document.addEventListener('change', function (e) {
    if (!e.target.matches || !e.target.matches('.shape-input input[type="range"]')) return;
    handleShapeChange(e.target.dataset.shape, e.target.value);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      var tab = e.target.closest && e.target.closest('.day-tab');
      if (!tab) return;
      e.preventDefault();
      var all = Array.prototype.slice.call(document.querySelectorAll('.day-tab'));
      var idx = all.indexOf(tab);
      var dir = e.key === 'ArrowRight' ? 1 : -1;
      var next = (idx + dir + all.length) % all.length;
      activate(all[next].dataset.tab, { focus: true, updateHash: true });
    } else if (e.key === 'Escape') {
      if (activeTab === 'settings') {
        var target = lastDayTab || firstAvailableDayTab();
        if (target) activate(target, { updateHash: true });
      }
    }
  });

  function fromHash() {
    if (location.hash === '#settings') {
      activate('settings', {});
      return;
    }
    var m = /^#day-(.+)$/.exec(location.hash);
    if (m) activate(m[1], {});
  }
  window.addEventListener('hashchange', fromHash);

  window.addEventListener('resize', syncHeaderOffset);

  // ============================================================
  //  Boot
  // ============================================================
  renderSettingsView();
  renderAll();
  // Hash takes priority over default "first day" on initial load.
  if (location.hash === '#settings' ||
      (location.hash && /^#day-/.test(location.hash))) {
    fromHash();
  }
  syncHeaderOffset();
})();

</script>
</body>
</html>
