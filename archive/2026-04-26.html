  function updateSettingsBadge() {
    // Count customisations = tiers/rules/shape knobs that differ from
    // the shipped defaults. Both subcategory_tiers and facet_tiers ship
    // a per-key default; diff is "current tier != default tier".
    var count = 0;
    var subtiers = profile.subcategory_tiers || {};
    var defaultSubtiers = defaultProfile.subcategory_tiers || {};
    for (var k in subtiers) {
      var def = defaultSubtiers[k] || 'neutral';
      if (subtiers[k] !== def) count++;
    }
    for (var d in defaultSubtiers) {
      if (!(d in subtiers)) {
        if ((defaultSubtiers[d] || 'neutral') !== 'neutral') count++;
      }
    }
    var ftiers = profile.facet_tiers || {};
    var defaultFtiers = defaultProfile.facet_tiers || {};
    for (var fk in ftiers) {
      var fdef = defaultFtiers[fk] || 'neutral';
      if (ftiers[fk] !== fdef) count++;
    }
    for (var fd in defaultFtiers) {
      if (!(fd in ftiers)) {
        if ((defaultFtiers[fd] || 'neutral') !== 'neutral') count++;
      }
    }
    // Rule states differing from defaults
    var curStates = profile.rule_states || {};
    var defStates = defaultProfile.rule_states || {};
    for (var rs in curStates) {
      var def = defStates[rs] || 'on';
      if (curStates[rs] !== def) count++;
    }
    // Shape overrides differing from defaults
    var shapeFields = ['score_floor', 'diversity_category', 'diversity_subcategory'];
    for (var si = 0; si < shapeFields.length; si++) {
      var f = shapeFields[si];
      if (profile[f] != null && profile[f] !== defaultProfile[f]) count++;
    }
    var curTb = profile.tier_bonuses || {};
    var defTb = defaultProfile.tier_bonuses || {};
    var tierKeys = ['love', 'like', 'avoid'];
    for (var tk = 0; tk < tierKeys.length; tk++) {
      if (curTb[tierKeys[tk]] != null && curTb[tierKeys[tk]] !== defTb[tierKeys[tk]]) count++;
    }
    // Suburb tiers — diff against shipped defaults; outside-vs-outside
    // doesn't count.
    var curStiers = profile.suburb_tiers || {};
    var defStiers = defaultProfile.suburb_tiers || {};
    var seenSuburbs = {};
    for (var sk in curStiers) {
      seenSuburbs[sk] = true;
      var sdef = defStiers[sk] || 'outside';
      if (curStiers[sk] !== sdef) count++;
    }
    for (var sd in defStiers) {
      if (seenSuburbs[sd]) continue;
      // Suburb in defaults but absent in profile — tier is whatever
      // mergeProfile produced (defaults, post-merge). Treat as unchanged.
    }
    // Suburb tier weights
    var curSw = profile.suburb_tier_weights || {};
    var defSw = defaultProfile.suburb_tier_weights || {};
    var swKeys = ['home', 'local'];
    for (var swk = 0; swk < swKeys.length; swk++) {
      if (curSw[swKeys[swk]] != null && curSw[swKeys[swk]] !== defSw[swKeys[swk]]) count++;
    }
    var badge = document.querySelector('.settings-badge');
    if (!badge) return;
    badge.textContent = count;
    badge.hidden = count === 0;
  }

  // ============================================================
  //  Activation — one source of truth for which panel is visible
  // ============================================================
  function activate(tabName, opts) {
    opts = opts || {};
    if (!tabName) return;
    var tabBtn = document.querySelector('[data-tab="' + tabName + '"]');
    if (!tabBtn) return;

    activeTab = tabName;
    if (tabName !== 'settings') {
      lastDayTab = tabName;
      try { sessionStorage.setItem(SESSION_LAST_DAY, tabName); } catch (_) {}
    }

    var allTabs = document.querySelectorAll('.day-tab');
    for (var i = 0; i < allTabs.length; i++) {
      var match = allTabs[i].dataset.tab === tabName;
      allTabs[i].setAttribute('aria-selected', match ? 'true' : 'false');
      allTabs[i].tabIndex = match ? 0 : -1;
    }

    var dayPanels = document.querySelectorAll('.day');
    for (var j = 0; j < dayPanels.length; j++) {
      dayPanels[j].hidden = (dayPanels[j].id !== 'day-' + tabName);
    }
    var settingsView = document.getElementById('settings-view');
    if (settingsView) settingsView.hidden = tabName !== 'settings';

    if (opts.focus) tabBtn.focus();
    if (opts.updateHash) {
      var hash = tabName === 'settings' ? '#settings' : '#day-' + tabName;
      if (location.hash !== hash) history.replaceState(null, '', hash);
    }
    // Expanding the header (no resize event) would otherwise leave
    // --header-offset stale; recompute after any activation in case
    // layout shifted.
    syncHeaderOffset();
  }

  var siteHeader = document.querySelector('.site-header');
  function syncHeaderOffset() {
    if (!siteHeader) return;
    document.documentElement.style.setProperty(
      '--header-offset', siteHeader.offsetHeight + 'px'
    );
  }

  function firstAvailableDayTab() {
    var t = document.querySelector('.day-tab:not(.settings-tab)');
    return t ? t.dataset.tab : null;
  }

  // ============================================================
  //  Render orchestration
  // ============================================================
  function rebuildDayPanels(ranking, days, profile) {
    var mainEl = document.getElementById('main');
    if (!mainEl) return;
    // Remove existing .day nodes (but keep settings-view intact — its
    // chip state + scroll position are client-local and shouldn't be
    // wiped every time we re-rank).
    var existing = mainEl.querySelectorAll('.day');
    for (var i = 0; i < existing.length; i++) existing[i].remove();
    var settingsView = document.getElementById('settings-view');
    var tpl = document.createElement('div');
    for (var j = 0; j < days.length; j++) {
      var h = renderDayHtml(days[j], ranking[days[j]], profile);
      if (!h) continue;
      tpl.innerHTML = h;
      var dayEl = tpl.firstElementChild;
      if (!dayEl) continue;
      if (settingsView && settingsView.parentNode === mainEl) {
        mainEl.insertBefore(dayEl, settingsView);
      } else {
        mainEl.appendChild(dayEl);
      }
    }
  }

  function renderAll() {
    var ranking = buildRanking(profile);
    var days = [];
    var candidates = Object.keys(ranking).sort();
    for (var i = 0; i < candidates.length; i++) {
      var day = candidates[i];
      var hasAny = false;
      for (var catKey in ranking[day]) {
        if (ranking[day][catKey].length > 0) { hasAny = true; break; }
      }
      if (hasAny) days.push(day);
    }

    var dayCounts = computeDayCounts(ranking);

    var tabsEl = document.querySelector('.day-tabs');
    if (tabsEl) tabsEl.innerHTML = renderTabsHtml(days, dayCounts);

    rebuildDayPanels(ranking, days, profile);
    updateSettingsBadge();

    // Reactivate whichever tab was active. If it disappeared under the
    // new profile (unlikely — only happens if the day has no events),
    // fall back to the first available day or 'settings' if that was
    // the prior state.
    var target = activeTab;
    if (target && target !== 'settings' &&
        !document.querySelector('[data-tab="' + target + '"]')) {
      target = firstAvailableDayTab();
    }
    activate(target || firstAvailableDayTab(), {});
  }

  // ============================================================
  //  Delegated event handlers — tabs, sub-tabs, chips, buttons
  // ============================================================
  function handleTierChange(tag, tier) {
    // Always set explicitly (including 'neutral') so a user's explicit
    // choice overrides the seeded default. Relying on delete would let
    // the merged default leak back in.
    profile.subcategory_tiers = profile.subcategory_tiers || {};
    profile.subcategory_tiers[tag] = tier;
    saveProfile();
    var rows = document.querySelectorAll('.subcat-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.subcat === tag) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === tier ? 'true' : 'false');
        }
        rows[i].dataset.modified = isSubcatModified(tag) ? 'true' : 'false';
      }
    }
    renderAll();
  }

  function applyRuleState(ruleName, newState) {
    // Canonical update: rule_states, rule_weights, and effective
    // pinning_rules all move together. Returns the applied state.
    profile.rule_states = profile.rule_states || {};
    profile.rule_states[ruleName] = newState;

    var defaults = defaultProfile.rule_weights || {};
    profile.rule_weights[ruleName] = (newState === 'off')
      ? 0
      : defaults[ruleName];

    var capable = defaultProfile.pin_capable_rules || [];
    if (capable.indexOf(ruleName) !== -1) {
      var list = (profile.pinning_rules || []).filter(
        function (r) { return r !== ruleName; });
      if (newState === 'pin') list.push(ruleName);
      profile.pinning_rules = list;
    }
    return newState;
  }

  function handleRuleToggle(ruleName) {
    // Simple on/off for non-pin-capable rules.
    var current = (profile.rule_states || {})[ruleName] || 'on';
    var next = current === 'off' ? 'on' : 'off';
    applyRuleState(ruleName, next);
    var rows = document.querySelectorAll('.rule-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.rule === ruleName) {
        var btn = rows[i].querySelector('.rule-toggle');
        if (btn) {
          btn.setAttribute('aria-pressed', next === 'on' ? 'true' : 'false');
          btn.textContent = next === 'on' ? 'On' : 'Off';
        }
        rows[i].dataset.modified = isRuleModified(ruleName) ? 'true' : 'false';
      }
    }
    saveProfile();
    renderAll();
  }

  function handleRuleStateChip(ruleName, newState) {
    // Tri-state (Pin/On/Off) for pin-capable rules.
    applyRuleState(ruleName, newState);
    var rows = document.querySelectorAll('.rule-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.rule === ruleName) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === newState ? 'true' : 'false');
        }
        rows[i].dataset.modified = isRuleModified(ruleName) ? 'true' : 'false';
      }
    }
    saveProfile();
    renderAll();
  }

  function handleShapeChange(field, value) {
    var v = parseFloat(value);
    if (isNaN(v)) return;
    if (field === 'score_floor') profile.score_floor = v;
    else if (field === 'diversity_category') profile.diversity_category = v;
    else if (field === 'diversity_subcategory') profile.diversity_subcategory = v;
    else if (field === 'love_bonus' || field === 'like_bonus' || field === 'avoid_bonus') {
      // Clone so the tier_bonuses dict isn't shared with defaults.
      profile.tier_bonuses = Object.assign({}, profile.tier_bonuses || {});
      if (field === 'love_bonus')  profile.tier_bonuses.love  = v;
      if (field === 'like_bonus')  profile.tier_bonuses.like  = v;
      if (field === 'avoid_bonus') profile.tier_bonuses.avoid = v;
    }
    // Update value display for this row without disturbing the slider.
    var row = document.querySelector('.shape-row[data-shape="' + field + '"]');
    if (row) {
      var disp = row.querySelector('.shape-value');
      if (disp) disp.textContent = v.toFixed(2);
      row.dataset.modified = isShapeModified(field) ? 'true' : 'false';
    }
    saveProfile();
    renderAll();
  }

  function handleFacetTierChange(name, tier) {
    profile.facet_tiers = profile.facet_tiers || {};
    profile.facet_tiers[name] = tier;
    saveProfile();
    var rows = document.querySelectorAll('.facet-row');
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.facet === name) {
        var chips = rows[i].querySelectorAll('.tri');
        for (var j = 0; j < chips.length; j++) {
          chips[j].setAttribute('aria-pressed',
            chips[j].dataset.value === tier ? 'true' : 'false');
        }
        rows[i].dataset.modified = isFacetModified(name) ? 'true' : 'false';
      }
    }
    renderAll();
  }

  function handleSuburbTierChange(suburb, tier) {
    // Always set explicitly (including 'outside') so a user's explicit
    // choice overrides the seeded default. The current section the
    // suburb sits in needs to update too — easier to re-render the
    // whole Suburbs panel than surgically rewire the DOM.
    profile.suburb_tiers = profile.suburb_tiers || {};
    profile.suburb_tiers[suburb] = tier;
    saveProfile();
    rerenderSettingsPreservingSubtab();
    renderAll();
  }

  function toggleAddSuburbPicker(tier) {
    // Show only the picker for `tier`; hide any other open one. If
    // `tier`'s picker was already open, close it.
    var pickers = document.querySelectorAll('.add-suburb-picker');
    var wantOpen = null;
    for (var i = 0; i < pickers.length; i++) {
      var p = pickers[i];
      var isTarget = p.dataset.addTier === tier;
      var isOpen = !p.hidden;
      if (isTarget && !isOpen) wantOpen = p;
      p.hidden = true;
    }
    if (wantOpen) {
      wantOpen.hidden = false;
      var sel = wantOpen.querySelector('select');
      if (sel) sel.focus();
    }
  }

  function handleAddSuburbToTier(tier, suburb) {
    if (!suburb) return;
    profile.suburb_tiers = profile.suburb_tiers || {};
    profile.suburb_tiers[suburb] = tier;
    saveProfile();
    rerenderSettingsPreservingSubtab();
    renderAll();
  }

  function handleSuburbWeightChange(tier, value) {
    var v = parseFloat(value);
    if (isNaN(v)) return;
    profile.suburb_tier_weights = Object.assign(
      {}, profile.suburb_tier_weights || {});
    profile.suburb_tier_weights[tier] = v;
    var row = document.querySelector('.shape-row[data-suburb-weight="' + tier + '"]');
    if (row) {
      var disp = row.querySelector('.shape-value');
      if (disp) disp.textContent = v.toFixed(2);
      row.dataset.modified = isSuburbWeightModified(tier) ? 'true' : 'false';
    }
    saveProfile();
    renderAll();
  }

  function switchSubtab(name) {
    var subtabs = document.querySelectorAll('.settings-subtab');
    for (var i = 0; i < subtabs.length; i++) {
      subtabs[i].setAttribute('aria-selected',
        subtabs[i].dataset.subtab === name ? 'true' : 'false');
    }
    var panels = document.querySelectorAll('.settings-panel');
    for (var j = 0; j < panels.length; j++) {
      panels[j].hidden = panels[j].dataset.subtab !== name;
    }
  }

  function toggleShowMore(btn) {
    var panel = btn.nextElementSibling;
    if (!panel || !panel.classList.contains('events-expanded')) return;
    var expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    panel.hidden = expanded;
    if (!btn.dataset.initialLabel) btn.dataset.initialLabel = btn.textContent;
    btn.textContent = expanded ? btn.dataset.initialLabel : 'Show fewer';
  }

  document.addEventListener('click', function (e) {
    var tab = e.target.closest && e.target.closest('.day-tab');
    if (tab) { activate(tab.dataset.tab, { updateHash: true }); return; }

    var subtab = e.target.closest && e.target.closest('.settings-subtab');
    if (subtab) { switchSubtab(subtab.dataset.subtab); return; }

    var chip = e.target.closest && e.target.closest('.tri');
    if (chip) {
      var subRow = chip.closest('.subcat-row');
      if (subRow) {
        handleTierChange(subRow.dataset.subcat, chip.dataset.value);
        return;
      }
      var facetRow = chip.closest('.facet-row');
      if (facetRow) {
        handleFacetTierChange(facetRow.dataset.facet, chip.dataset.value);
        return;
      }
      var ruleRowChip = chip.closest('.rule-row');
      if (ruleRowChip) {
        handleRuleStateChip(ruleRowChip.dataset.rule, chip.dataset.value);
        return;
      }
      var suburbRowChip = chip.closest('.suburb-row');
      if (suburbRowChip) {
        handleSuburbTierChange(suburbRowChip.dataset.suburb, chip.dataset.value);
        return;
      }
    }

    var addSuburb = e.target.closest && e.target.closest('.add-suburb-btn');
    if (addSuburb) {
      toggleAddSuburbPicker(addSuburb.dataset.addSuburb);
      return;
    }

    var ruleBtn = e.target.closest && e.target.closest('.rule-toggle');
    if (ruleBtn) {
      var rRow = ruleBtn.closest('.rule-row');
      if (rRow) handleRuleToggle(rRow.dataset.rule);
      return;
    }

    var showMore = e.target.closest && e.target.closest('.show-more');
    if (showMore) { toggleShowMore(showMore); return; }

    // Score breakdown chip: tap toggles .open on mobile; mouse users
    // get :hover automatically. Clicking outside any chip closes them.
    var chipEl = e.target.closest && e.target.closest('.score-chip');
    var openChips = document.querySelectorAll('.score-chip.open');
    for (var oc = 0; oc < openChips.length; oc++) {
      if (openChips[oc] !== chipEl) openChips[oc].classList.remove('open');
    }
    if (chipEl) { chipEl.classList.toggle('open'); return; }

    var action = e.target.closest && e.target.closest('[data-action]');
    if (action) {
      if (action.dataset.action === 'reset-subcategories') {
        // Reset to the shipped defaults (not empty) so the baseline
        // taste seeding is restored.
        var base = defaultProfile.subcategory_tiers || {};
        profile.subcategory_tiers = {};
        for (var rk in base) profile.subcategory_tiers[rk] = base[rk];
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-facets') {
        var fbase = defaultProfile.facet_tiers || {};
        profile.facet_tiers = {};
        for (var fk in fbase) profile.facet_tiers[fk] = fbase[fk];
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-rules') {
        profile.rule_states = Object.assign({}, defaultProfile.rule_states || {});
        profile.rule_weights = Object.assign({}, defaultProfile.rule_weights || {});
        profile.pinning_rules = (defaultProfile.pinning_rules || []).slice();
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-suburbs') {
        profile.suburb_tiers = Object.assign({}, defaultProfile.suburb_tiers || {});
        profile.suburb_tier_weights = Object.assign(
          {}, defaultProfile.suburb_tier_weights || {});
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      } else if (action.dataset.action === 'reset-shape') {
        profile.score_floor = defaultProfile.score_floor;
        profile.diversity_category = defaultProfile.diversity_category;
        profile.diversity_subcategory = defaultProfile.diversity_subcategory;
        profile.tier_bonuses = Object.assign({}, defaultProfile.tier_bonuses || {});
        saveProfile();
        rerenderSettingsPreservingSubtab();
        renderAll();
      }
      return;
    }
  });

  // Shape sliders emit 'input' while dragging and 'change' on release.
  // Update the value display live on every 'input' for tight feedback,
  // but only re-rank on 'change' so we don't rebuild the DOM 60×/second.
  document.addEventListener('input', function (e) {
    if (!e.target.matches) return;
    if (e.target.matches('.shape-input input[type="range"]') ||
        e.target.matches('.suburb-weight-input input[type="range"]')) {
      var row = e.target.closest('.shape-row');
      if (!row) return;
      var disp = row.querySelector('.shape-value');
      if (disp) disp.textContent = parseFloat(e.target.value).toFixed(2);
    }
  });
  document.addEventListener('change', function (e) {
    if (!e.target.matches) return;
    if (e.target.matches('.shape-input input[type="range"]')) {
      handleShapeChange(e.target.dataset.shape, e.target.value);
    } else if (e.target.matches('.suburb-weight-input input[type="range"]')) {
      handleSuburbWeightChange(e.target.dataset.suburbWeight, e.target.value);
    } else if (e.target.matches('select[data-add-suburb-select]')) {
      handleAddSuburbToTier(e.target.dataset.addSuburbSelect, e.target.value);
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      var tab = e.target.closest && e.target.closest('.day-tab');
      if (!tab) return;
      e.preventDefault();
      var all = Array.prototype.slice.call(document.querySelectorAll('.day-tab'));
      var idx = all.indexOf(tab);
      var dir = e.key === 'ArrowRight' ? 1 : -1;
      var next = (idx + dir + all.length) % all.length;
      activate(all[next].dataset.tab, { focus: true, updateHash: true });
    } else if (e.key === 'Escape') {
      if (activeTab === 'settings') {
        var target = lastDayTab || firstAvailableDayTab();
        if (target) activate(target, { updateHash: true });
      }
    }
  });

  function fromHash() {
    if (location.hash === '#settings') {
      activate('settings', {});
      return;
    }
    var m = /^#day-(.+)$/.exec(location.hash);
    if (m) activate(m[1], {});
  }
  window.addEventListener('hashchange', fromHash);

  window.addEventListener('resize', syncHeaderOffset);

  // ============================================================
  //  Boot
  // ============================================================
  renderSettingsView();
  renderAll();
  // Hash takes priority over default "first day" on initial load.
  if (location.hash === '#settings' ||
      (location.hash && /^#day-/.test(location.hash))) {
    fromHash();
  }
  syncHeaderOffset();
})();

</script>
</body>
</html>
